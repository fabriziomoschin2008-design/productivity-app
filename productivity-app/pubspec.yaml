name: productivity_app
description: "App personale di produttività: finanze, note, calendario, to-do."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  drift: ^2.23.0
  drift_flutter: ^0.2.4
  go_router: ^14.6.2
  fl_chart: ^0.70.2
  intl: ^0.20.1
  uuid: ^4.5.1
  google_fonts: ^6.2.1
  flutter_quill: ^11.5.1
  table_calendar: ^3.1.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.23.0

flutter:
  uses-material-design: true
